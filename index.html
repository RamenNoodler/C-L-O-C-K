<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atmospheric Study Clock</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- LAYER 1: YOUTUBE VIDEO -->
    <div id="video-container">
        <div id="player"></div>
    </div>

    <!-- LAYER 2: COLOR TINT OVERLAY -->
    <div id="app-bg-overlay"></div>

    <!-- LAYER 3: APP UI -->
    <header class="hud-top">
        <div id="weather-widget" class="glass-ui theme-border">
            <div id="city-label" class="mini-tag">SYSTEM IDLE</div>
            <div class="main-stats">
                <span id="temp-val" class="grad-text">--</span>
                <span id="unit-val">°F</span>
                <span id="cond-tag" class="theme-bg">STBY</span>
            </div>
        </div>
        <button id="sidebar-toggle" class="glass-btn theme-border">⚙️ SETTINGS</button>
    </header>

    <main id="clock-stage">
        <div id="clock-digits" class="grad-text">00:00:00</div>
        <div id="reflection-container">
            <div id="clock-reflection" class="grad-text">00:00:00</div>
        </div>
    </main>

    <footer id="forecast-bar" class="theme-border-top">
        <div class="forecast-header">7-DAY GEOGRAPHIC PROJECTION</div>
        <div id="forecast-container"></div>
    </footer>

    <svg style="display:none">
        <filter id="ripple-filter">
            <feTurbulence type="fractalNoise" baseFrequency="0.01 0.1" numOctaves="2" result="noise" />
            <feDisplacementMap in="SourceGraphic" in2="noise" scale="45" id="wave-scale" />
        </filter>
    </svg>

    <aside id="settings-sidebar" class="sidebar">
        <div class="sidebar-header">
            <h3>LOGISTICS</h3>
            <button id="close-sidebar">×</button>
        </div>

        <div class="setting-item">
            <label>YouTube Video ID</label>
            <input type="text" id="yt-id-field" placeholder="e.g. jfKfPfyJRdk" value="jfKfPfyJRdk">
            <small>Find a video on YT and paste the ID here.</small>
        </div>

        <div class="setting-item">
            <label>Weather API Key (OpenWeather)</label>
            <input type="password" id="api-field" placeholder="Paste Key Here...">
        </div>

        <div class="setting-item">
            <label>Temperature Units</label>
            <div class="toggle-row">
                <button id="btn-c">Celsius</button>
                <button id="btn-f" class="active">Fahrenheit</button>
            </div>
        </div>

        <div class="setting-item">
            <label>Clock Gradient (Top/Bottom)</label>
            <div class="picker-row">
                <input type="color" id="grad-start" value="#00f2ff">
                <span>→</span>
                <input type="color" id="grad-end" value="#7000ff">
            </div>
        </div>

        <div class="setting-item">
            <label>Overlay Tint / Background</label>
            <input type="color" id="bg-picker" value="#000000">
        </div>

        <div class="setting-item">
            <label>Location Search</label>
            <div id="map"></div>
        </div>
    </aside>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="script.js"></script>
</body>
</html>
