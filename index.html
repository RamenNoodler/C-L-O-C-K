<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atmospheric Study Clock</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>
<body>
    <div id="app-bg"></div>
    
    <div class="top-controls">
        <button id="menu-toggle" class="glass-btn">⚙️ Settings</button>
        <div id="weather-now" class="glass-card">
            <div id="city-name">SELECT A LOCATION</div>
            <div class="temp-row">
                <span id="current-temp">--°</span>
                <span id="current-desc">WAITING</span>
            </div>
        </div>
    </div>

    <div id="clock-stage">
        <div id="clock-main" class="txt-solid">00:00:00</div>
        <div id="reflect-area">
            <div id="clock-reflect" class="txt-solid">00:00:00</div>
        </div>
    </div>

    <!-- 7-DAY FORECAST BAR -->
    <div id="forecast-container">
        <div class="forecast-title">7-DAY GEOGRAPHIC FORECAST</div>
        <div id="weekly-strip">
            <!-- JS will inject 7 cards here -->
        </div>
    </div>

    <svg style="position: absolute; width: 0; height: 0;">
        <filter id="water-filter">
            <feTurbulence type="fractalNoise" baseFrequency="0.01 0.1" numOctaves="2" result="noise" />
            <feDisplacementMap in="SourceGraphic" in2="noise" scale="40" id="wave-intensity-map" />
        </filter>
    </svg>

    <div id="settings-sidebar" class="sidebar">
        <div class="sidebar-header">
            <h3>Customization</h3>
            <button id="close-menu">×</button>
        </div>

        <div class="setting-group">
            <label>Text Style</label>
            <select id="text-style-select">
                <option value="txt-solid">Solid Glow</option>
                <option value="txt-red-yellow">Red to Yellow Gradient</option>
                <option value="txt-rainbow">Animated Rainbow</option>
                <option value="txt-bw">Monochrome (B&W)</option>
            </select>
        </div>

        <div class="setting-group">
            <label>Background Color</label>
            <input type="color" id="bg-color-pk" value="#000000">
        </div>

        <div class="setting-group">
            <label>Main Theme Color</label>
            <input type="color" id="theme-pk" value="#00f2ff">
        </div>

        <div class="setting-group">
            <label>City Search</label>
            <div class="search-box">
                <input type="text" id="city-input" placeholder="Search (Alaska, AZ...)">
                <button id="search-btn">🔍</button>
            </div>
            <div id="map"></div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="script.js"></script>
</body>
</html>
