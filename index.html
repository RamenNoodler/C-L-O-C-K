<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Custom Clock</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron&family=Roboto+Mono:wght@400;700&family=Share+Tech+Mono&family=Courier+Prime&family=VT323&family=Lobster&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Video Background Layers -->
    <div id="video-bg-container"></div>
    <div id="youtube-bg-container"></div>
    <div id="bg-overlay"></div>

    <div id="clock-container">
        <div id="clock-display">00:00:00</div>
    </div>

    <!-- Toggle Gear -->
    <button id="menu-toggle" aria-label="Settings">⚙️</button>

    <div id="settings-panel" class="hidden">
        <h3>Clock Settings</h3>
        
        <div class="setting-group">
            <label>Font Family</label>
            <select id="font-family">
                <option value="'Orbitron', sans-serif">Orbitron (Digital)</option>
                <option value="'VT323', monospace">Retro Arcade</option>
                <option value="'Share Tech Mono', monospace">Share Tech</option>
                <option value="'Roboto Mono', monospace">Roboto Mono</option>
                <option value="'Lobster', cursive">Lobster (Fancy)</option>
            </select>
        </div>

        <div class="setting-group">
            <label>Font Size (<span id="size-val">80</span>px)</label>
            <input type="range" id="font-size" min="20" max="300" value="80">
        </div>

        <div class="setting-group">
            <label>Text Color</label>
            <input type="color" id="font-color" value="#ffffff">
        </div>

        <div class="setting-group">
            <label>Background Color (Fallback)</label>
            <input type="color" id="bg-color" value="#121212">
        </div>

        <div class="setting-group">
            <label>YouTube Video ID</label>
            <input type="text" id="yt-id" placeholder="e.g. jfKfPfyJRdk">
            <small>Paste the ID from after "v=" in the URL</small>
        </div>

        <div class="setting-group">
            <label>Video URL (Direct MP4)</label>
            <input type="text" id="video-url" placeholder="https://example.com/video.mp4">
        </div>

        <div class="setting-group">
            <label>Background Dim (Overlay)</label>
            <input type="range" id="bg-dim" min="0" max="100" value="30">
        </div>

        <button id="reset-btn">Reset Defaults</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
