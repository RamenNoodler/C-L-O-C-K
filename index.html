<!DOCTYPE html>
<html>
<head>
    <title>Clock</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
</head>
<body>

<button id="sidebar-toggle">⚙</button>

<div class="clock-wrapper">
    <div id="clock-digits">00:00:00</div>
    <div id="ampm-tag">AM</div>
</div>

<div id="reflection-container">
    <canvas id="reflection-canvas"></canvas>
</div>

<aside id="settings-sidebar" class="sidebar">
    <h2>Settings</h2>

    <label>Wave Intensity</label>
    <input type="range" id="wave-intensity" min="0" max="40" value="12">

    <label>Wave Speed</label>
    <input type="range" id="wave-speed" min="1" max="100" value="4">

    <label>Clock Format</label>
    <div class="clock-buttons">
        <button id="btn-12" class="active">12 Hour</button>
        <button id="btn-24">24 Hour</button>
    </div>

    <button id="close-sidebar">Close</button>
</aside>

<script src="script.js"></script>
</body>
</html>
